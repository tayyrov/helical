[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cellreprogrammer"
version = "0.1.0"
description = "Cell reprogramming experiments using helical foundation models"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Your Name", email = "your.email@example.com"}
]
keywords = ["single-cell", "cell-reprogramming", "foundation-models", "perturbation"]

dependencies = [
    "helical>=0.0.1",
    "torch>=2.0.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scanpy>=1.9.0",
    "anndata>=0.9.0",
    "datasets>=2.14.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "scikit-learn>=1.3.0",
    "umap-learn>=0.5.0",
    "scipy>=1.11.0",
    "tqdm>=4.65.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
    "flake8>=6.0",
    "ipykernel>=6.0",
]

[project.urls]
Homepage = "https://github.com/YOUR_USERNAME/cellreprogrammer"
Repository = "https://github.com/YOUR_USERNAME/cellreprogrammer"

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ['py310']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"



